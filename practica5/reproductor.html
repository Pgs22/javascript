<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor</title>
    <script src="reproductor.js" defer type="module"></script>
</head>
<body>
    <h3>Gestió de Llistes</h3>
    Nova llista: <input type="text" id="input_nomLlista"> 
    <button id="btn_crear_llista"> CREAR LLISTA</button>

    <hr>
    <h3>Filtre</h3>
    Filtrar llistes per etiqueta: 
    <select id="select_filtre">
        <option value="">-- Totes les etiquetes --</option>
    </select>
    <button id="btn_netejar_filtre">MOSTRAR TOTES</button>
    <hr>

    <div id="div_llista_musiques"></div>

    <!-- crear objectes musica amb formulari -->

    <div id="formulari_musica">
        <h1>Gestió de Música</h1>
        <form name="form_musica" novalidate>
            <input type="text" name="titol" placeholder="Títol cançó (2-20)">
            <span></span><br>

            <select name="fitxer">
                <option value="pista1.mp3">pista1.mp3</option>
                <option value="pista2.wav">pista2.wav</option>
                <option value="pista3.ogg">pista3.ogg</option>
            </select>
            <span></span><br>

            <label>Pop <input type="checkbox" name="etiqueta" value="pop"></label>
            <label>Rock <input type="checkbox" name="etiqueta" value="rock"></label>
            <label>Efectes <input type="checkbox" name="etiqueta" value="efectes"></label>
            <span id="error_etiquetes"></span><br>

            <button type="button" id="btn_valida_musica">CREAR MÚSICA</button>
        </form>
    </div>

    <hr>
    <div id="div_llista_musiques"></div>

</body>
</html>
